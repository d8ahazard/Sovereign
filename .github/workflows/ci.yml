name: CI

# Builds the managed Sovereign solution and runs the non-privileged unit tests.
# This mirrors scripts/verify.ps1, which can be run locally. The product is local-first;
# this workflow only compiles source and runs tests. It does not give Sovereign any runtime
# network behavior, and it performs no privileged action.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Sovereign.slnx

      - name: Verify formatting
        run: dotnet format Sovereign.slnx --verify-no-changes --no-restore

      - name: Build (Release, warnings as errors)
        run: dotnet build Sovereign.slnx -c Release --no-restore

      - name: Unit tests
        run: dotnet test tests/Sovereign.UnitTests/Sovereign.UnitTests.csproj -c Release --no-build

      - name: Integration tests
        run: dotnet test tests/Sovereign.IntegrationTests/Sovereign.IntegrationTests.csproj -c Release --no-build

      - name: Security tests
        run: dotnet test tests/Sovereign.SecurityTests/Sovereign.SecurityTests.csproj -c Release --no-build
